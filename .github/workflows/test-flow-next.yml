name: flow-next

on:
  push:
    branches: [main]
    paths:
      - "plugins/flow-next/**"
      - ".github/workflows/test-flow-next.yml"
  pull_request:
    branches: [main]
    paths:
      - "plugins/flow-next/**"
      - ".github/workflows/test-flow-next.yml"
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash # Git Bash on Windows; bash on Linux/macOS — unifies the matrix.

    steps:
      - name: Disable git autocrlf so checkout preserves LF on Windows
        run: git config --global core.autocrlf false
        # Default Windows-runner config converts LF→CRLF on checkout, which
        # changes heredoc bytes that smokes compare byte-identically against
        # flowctl output. Force LF on all OSes for consistent fixtures.

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git identity (smoke tests create commits)
        run: |
          git config --global user.email "ci@flow-next.test"
          git config --global user.name "flow-next CI"
          git config --global init.defaultBranch main

      # ──────────── Static checks (cheap, fail fast) ────────────

      - name: Syntax check — flowctl.py
        run: python -m py_compile plugins/flow-next/scripts/flowctl.py

      - name: Syntax check — ralph.sh
        run: bash -n plugins/flow-next/skills/flow-next-ralph-init/templates/ralph.sh

      # ──────────── Python unit tests (sub-second, fail fast) ────────────
      # fn-43.17 — fast invariants for migrate-rename, lockfile, read-compat,
      # banner suppression, and write-location selector. Runs the migrate +
      # lockfile + read-compat + write-location + banner suites explicitly so
      # an unrelated pre-existing failure in a sibling test file doesn't gate
      # this signal.

      - name: Python unit tests — fn-43 invariants
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_migrate_rename.py" \
            -v
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_lockfile.py" \
            -v
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_read_compat.py" \
            -v
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_write_location.py" \
            -v
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_banner.py" \
            -v

      # ──────────── fn-50 (clawpatch wrap) ────────────
      # New readers + scout-fallback contract land here so they run on the full
      # ubuntu / macos / windows matrix. Tests use checked-in fixtures (no
      # clawpatch CLI invocation), so runners do not need Node 22+.

      - name: Python unit tests — repo-map readers (fn-50.2)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_repo_map.py" \
            -v

      - name: Python unit tests — scout fallback contract (fn-50.3)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_scout_fallback_contract.py" \
            -v

      # ──────────── Copilot stdin path (1.1.9) ────────────
      # Mocked unit tests run on all three platforms; the real-subprocess
      # Windows smoke fires only on windows-latest (skipUnless gate). The
      # smoke validates that subprocess.run(input=prompt) delivers a 60 KB
      # prompt through CreateProcessW + stdin pipe without hitting the
      # 32,767-char argv cap — the Simon Flauger / SEMA-CAD failure mode.

      - name: Python unit tests — copilot run-exec (1.1.9 stdin path)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_copilot_run_exec.py" \
            -v
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_copilot_windows_smoke.py" \
            -v

      # ──────────── Functional smokes (ordered cheap-first) ────────────
      # All smokes refuse to run from the main plugin repo, so cd into the
      # runner's temp dir before invoking. $RUNNER_TEMP is set on every
      # GitHub-hosted runner (ubuntu/macos/windows).

      - name: ci_test.sh (flowctl integration, 58 cases)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/ci_test.sh"

      - name: alias_smoke.sh (deprecation alias paths, 20 cases, ~5s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/alias_smoke.sh"

      - name: migration_smoke.sh (migrate-rename + rollback + banner, 41 cases, ~30s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/migration_smoke.sh"

      - name: resolve-pr_smoke_test.sh (58 cases, ~1s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/resolve-pr_smoke_test.sh"

      - name: strategy_smoke_test.sh (62 cases, ~5s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/strategy_smoke_test.sh"

      - name: audit_smoke_test.sh (41 cases, ~6s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/audit_smoke_test.sh"

      - name: glossary_smoke_test.sh (80 cases, ~7s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/glossary_smoke_test.sh"

      - name: prospect_smoke_test.sh (94 cases, ~60s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/prospect_smoke_test.sh"

      - name: make-pr_smoke_test.sh (67 cases, ~7s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/make-pr_smoke_test.sh"

      - name: map_smoke_test.sh (74 cases, fn-50.1 + fn-50.6 directory-level ignore guard)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/map_smoke_test.sh"

      - name: impl-review_smoke_test.sh (74 cases, ~70s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/impl-review_smoke_test.sh"

      - name: smoke_test.sh (130 cases, ~100s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/smoke_test.sh"

      # Smokes intentionally skipped (require external CLIs not on GitHub runners):
      #   - ralph_smoke_test.sh / ralph_smoke_rp.sh — need claude / codex / rp-cli
      #   - plan_review_prompt_smoke.sh — needs rp-cli
