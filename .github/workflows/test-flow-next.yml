name: flow-next

on:
  push:
    branches: [main]
    paths:
      - "plugins/flow-next/**"
      - ".github/workflows/test-flow-next.yml"
      # Dogfood copies guarded against template drift (test_dogfood_template_parity).
      - ".flow/usage.md"
      - ".flow/templates/spec.md"
      # Cursor local-installers live at repo-root scripts/ (1.9.0) — outside
      # plugins/flow-next/**, so trigger explicitly to run the install smoke.
      - "scripts/install-cursor.sh"
      - "scripts/install-cursor.ps1"
      - "scripts/ci/verify_cursor_install.py"
  pull_request:
    branches: [main]
    paths:
      - "plugins/flow-next/**"
      - ".github/workflows/test-flow-next.yml"
      - ".flow/usage.md"
      - ".flow/templates/spec.md"
      - "scripts/install-cursor.sh"
      - "scripts/install-cursor.ps1"
      - "scripts/ci/verify_cursor_install.py"
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash # Git Bash on Windows; bash on Linux/macOS — unifies the matrix.

    steps:
      - name: Disable git autocrlf so checkout preserves LF on Windows
        run: git config --global core.autocrlf false
        # Default Windows-runner config converts LF→CRLF on checkout, which
        # changes heredoc bytes that smokes compare byte-identically against
        # flowctl output. Force LF on all OSes for consistent fixtures.

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git identity (smoke tests create commits)
        run: |
          git config --global user.email "ci@flow-next.test"
          git config --global user.name "flow-next CI"
          git config --global init.defaultBranch main

      # ──────────── Static checks (cheap, fail fast) ────────────

      - name: Syntax check — flowctl.py
        run: python -m py_compile plugins/flow-next/scripts/flowctl.py

      - name: Syntax check — ralph.sh
        run: bash -n plugins/flow-next/skills/flow-next-ralph-init/templates/ralph.sh

      # ──────────── Python unit tests (sub-second, fail fast) ────────────
      # fn-43.17 — fast invariants for migrate-rename, lockfile, read-compat,
      # banner suppression, and write-location selector. Runs the migrate +
      # lockfile + read-compat + write-location + banner suites explicitly so
      # an unrelated pre-existing failure in a sibling test file doesn't gate
      # this signal.

      - name: Python unit tests — fn-43 invariants
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_migrate_rename.py" \
            -v
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_lockfile.py" \
            -v
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_read_compat.py" \
            -v
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_write_location.py" \
            -v
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_banner.py" \
            -v

      - name: Python unit tests — work.delegate config foundation (fn-55.1)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_work_delegate_config.py" \
            -v
        # Codex implementation-delegation config defaults + activation
        # resolution precedence (arg > config > default off; generic
        # "use codex" is NOT a delegation trigger).

      - name: Python unit tests — Codex-delegation pre-flight gates (fn-55.2)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_codex_delegation_gates.py" \
            -v
        # Executes the shipped platform-gate + recursion-guard bash from
        # references/codex-delegation.md (CODEX_SANDBOX=auto stays eligible —
        # the Ralph case; runtime values like `seatbelt` trip the guard) and
        # locks the progressive-disclosure + disambiguation prose contract.

      - name: Python unit tests — Codex-delegation classify + rollback (fn-55.4)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_codex_delegation_classify.py" \
            -v
        # Deterministic `flowctl codex classify-result` (5-row table + malformed/
        # missing) + `rollback-plan` (post−pre untracked-snapshot diff, path
        # sanitization, nested-dir, whitespace, .flow/ exclusion) driven by the
        # mock-codex fixture; dual-copy invariant (both flowctl.py copies carry
        # the helpers + live .flow/bin/flowctl resolves them); orchestration/
        # safety prose contract; clean-baseline-excludes-.flow predicate
        # (multi-task plan-sync stays delegatable after task 1).

      - name: Python unit tests — ralph-guard amendment + circuit breaker (fn-55.5)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_ralph_guard_codex_delegation.py" \
            -v
        # ralph-guard.py `is_canonical_codex_delegation` allows ONLY the FULL
        # canonical delegation shape (sentinel + codex exec + --ignore-user-config
        # + --output-schema + -o .flow/tmp/codex-* + sandbox flag, NO --last/
        # resume/review) — a sentinel-prefixed arbitrary command STILL blocks;
        # copilot + --last blocks stay intact; RALPH_GUARD_VERSION bumped. Drives
        # the SHIPPED hook end-to-end (PreToolUse Bash, FLOW_RALPH=1). Also locks
        # the host-owned circuit-breaker + worker DELEGATION_RESULT/ACTION signal
        # + evidence.delegation inline + attribution trailers + REVIEW_MODE=none
        # verification-backstop prose contract.

      # ──────────── fn-83 (plan-sync gate: probe + frozen-key corpus) ────────────

      - name: Python unit tests — worker anchor-call prose + gate-removal guards + done-evidence provenance (fn-83.4)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_worker_anchor_prose.py" \
            -v
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_anchor_bundle.py" \
            -v
        # The plan-sync skip-gate was proven non-viable (fn-83.6 cross-repo
        # verdict FAIL; decision record plan-sync-skip-gate-not-viable-
        # 2026-07-03.md) and its machinery removed from the shipped CLI.
        # Locks: worker Phase 1 = single `flowctl anchor` call (floor, not
        # ceiling) in canonical AND Codex mirror; CROSS_SPEC passed to the
        # (still unconditional) plan-sync spawn; both gate-removal grep
        # guards (user-surface + symbol-level, `_psp_run_git`-only
        # whitelist); PLAN_DEVIATION fully deleted; BASE_COMMIT + done-
        # evidence provenance (base_commit + full commit list) retained,
        # fixture-verified round-trip.

      # ──────────── fn-50 (clawpatch wrap) ────────────
      # New readers + scout-fallback contract land here so they run on the full
      # ubuntu / macos / windows matrix. Tests use checked-in fixtures (no
      # clawpatch CLI invocation), so runners do not need Node 22+.

      - name: Python unit tests — repo-map readers (fn-50.2)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_repo_map.py" \
            -v

      - name: Python unit tests — scout fallback contract (fn-50.3)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_scout_fallback_contract.py" \
            -v

      - name: Python unit tests — review-output R-ID parser suffix (1.3.4)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_unaddressed_rids_parser.py" \
            -v

      - name: Python unit tests — dogfood template parity (1.5.1)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_dogfood_template_parity.py" \
            -v
        # Guards .flow/usage.md ≡ canonical setup template (and spec.md) so the
        # fn-52 desync — tracker-sync docs added to the dogfood copy but not the
        # bundled template — hard-fails CI instead of shipping to consumers.

      - name: Python unit tests — cp1252 / non-UTF-8 robustness (1.10.1, #167)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_cp1252_robustness.py" \
            -v
        # find_references decodes git-grep bytes defensively (no UnicodeDecodeError
        # on a legacy cp1252 source subtree — the read-side counterpart to #123),
        # flowctl forces UTF-8 stdout/stderr at startup, and phase-3d carries the
        # lost-worker-result recovery heuristic (canonical + Codex mirror). Runs on
        # the full ubuntu/macos/windows matrix — the fault is Windows-codepage-born.

      # ──────────── fn-57 (tracker-sync lifecycle observability) ────────────

      - name: Python unit tests — sync check lifecycle audit (fn-57.1)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_sync_check.py" \
            -v
        # Read-only `sync check` over `.flow/sync-runs/` receipts: R8 silent
        # constant-time exit when the bridge is inactive (gate precedes id
        # resolution), MISSING predicate (triggered ∩ perEvent-enabled ∩
        # no event-matching receipt ≥ --since), any-status clears, null-event
        # receipts never clear, nested work.* keys, Z-suffix --since on 3.8,
        # tracker-handle id resolution, exit-0-always contract.

      - name: Python unit tests — tracker receipts (fn-52.1 / fn-57.1)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_tracker_receipts.py" \
            -v
        # Sync receipt schema + guard isolation + tracker-handle
        # canonicalization, extended in fn-57.1 with the `--event` lifecycle
        # tag (free-form, `event: null` back-compat for pre-flag callers).

      # ──────────── fn-58 (spec readiness signal) ────────────

      - name: Python unit tests — spec ready flag (fn-58.1)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_spec_ready.py" \
            -v
        # Lazy on-disk `ready` flag: `spec create` never writes the key,
        # `normalize_epic` never backfills it, all three JSON read surfaces
        # (show/specs/list) emit explicit false, toggles are idempotent
        # no-ops (byte-identical sidecar, no updated_at churn), `.M` ids
        # rejected, tracker handles resolve, done specs allowed, human
        # listings badge ready specs only.

      # ──────────── fn-60 (land ship loop) ────────────

      - name: Python unit tests — land.* config defaults (fn-60.2)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_land_config.py" \
            -v
        # Seeded land.* defaults (release/patienceMinutes/reviewSignal/
        # automatedReviewers/ciFixBudget) — `config get` returns values, not
        # null, on fresh repos; set/get round-trips; dual flowctl.py copies
        # stay in lockstep.

      # ──────────── Cursor local-install (1.9.0) ────────────
      # The bash + PowerShell Cursor installers (scripts/install-cursor.{sh,ps1})
      # must not drift, and must actually produce a complete + clean install on
      # each OS. The parity test is cross-platform (text-only). The real-install
      # smoke runs the platform's OWN installer (rsync on Unix, robocopy on
      # Windows) into ~/.cursor/plugins/local and verifies the result against the
      # source tree (component trees match 1:1; codex/ tests/ *.pyc excluded).

      - name: Python unit tests — Cursor installer parity (1.9.0)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_install_cursor_parity.py" \
            -v

      - name: install-cursor.sh real-install smoke (Unix)
        if: always() && runner.os != 'Windows'
        run: |
          bash "$GITHUB_WORKSPACE/scripts/install-cursor.sh"
          python "$GITHUB_WORKSPACE/scripts/ci/verify_cursor_install.py"

      - name: install-cursor.ps1 real-install smoke (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          ./scripts/install-cursor.ps1
          python ./scripts/ci/verify_cursor_install.py

      - name: Python unit tests — PNPM_HOME hint prose contract (fn-50.1, Windows-coverage)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_pnpm_home_hint_prose.py" \
            -v
        # map_smoke_test.sh Case 4b skips on Windows (POSIX-only `chmod +x`
        # pnpm stub). This prose-contract test runs on all three OSes and
        # locks the PNPM_HOME hint structure — guard, tokens, re-source
        # instruction — across Claude canonical + Codex mirror.

      # ──────────── Copilot stdin path (1.1.9) ────────────
      # Mocked unit tests run on all three platforms; the real-subprocess
      # Windows smoke fires only on windows-latest (skipUnless gate). The
      # smoke validates that subprocess.run(input=prompt) delivers a 60 KB
      # prompt through CreateProcessW + stdin pipe without hitting the
      # 32,767-char argv cap — the Simon Flauger / SEMA-CAD failure mode.

      - name: Python unit tests — copilot run-exec (1.1.9 stdin path)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_copilot_run_exec.py" \
            -v
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_copilot_windows_smoke.py" \
            -v

      - name: Python unit tests — Cua native-rung headless/CI determination (fn-71)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_drive_headless_determination.py" \
            -v
        # Executes the shipped `cua-driver call get_screen_size` display probe from
        # references/cua.md against a stubbed driver (present → attended, error/zero
        # → headless) on macOS+ubuntu; the prose-contract class runs on Windows too
        # (the $CI short-circuit, the probe, the macOS $DISPLAY caveat, doctor≠display).
        # Real no-display behavior on Linux/Windows stays verify-at-build (driver opt-in).

      # ──────────── fn-68 (pilot backlog mode) ────────────

      - name: Python unit tests — pilot backlog mode (fn-68.1 / .2 / .5)
        run: |
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_pilot_backlog_substrate.py" \
            -v
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_tracker_sync_backlog_mode.py" \
            -v
          python -m unittest discover \
            -s plugins/flow-next/tests \
            -p "test_pilot_backlog_mirror_safety.py" \
            -v
        # .1 — flowctl substrate (pilot.autonomy scalar default, `ready --all`
        #   eligibility FACTS only, pilot-log decision rows under .flow/pilot-runs/).
        # .2 — tracker-sync R14 Phase-0 autonomy parity + the listOpenIssues 9th
        #   adapter method + the R15 question-valve anchor contract (prose).
        # .5 — cross-platform Codex-mirror parity + autonomous-safety: the R14 fix
        #   + triage/ask stages + ASKED verdict + backlog-mode.md survive the
        #   sync-codex.sh rewrite; ZERO Claude-native tool-name leakage; the R2
        #   numbered-prompt block is NEVER injected into pilot (it only negates);
        #   /goal stop-clause verbs (NO_WORK/DEFERRED_TO_LAND) grep-able; the
        #   never-merge / never-author enforcing guards + the byte-identical
        #   gate-off path survive in the mirror.

      # ──────────── Functional smokes (ordered cheap-first) ────────────
      # All smokes refuse to run from the main plugin repo, so cd into the
      # runner's temp dir before invoking. $RUNNER_TEMP is set on every
      # GitHub-hosted runner (ubuntu/macos/windows).

      - name: pick_python_test.sh (Windows 9009-stub probe regression, POSIX/Git-Bash, fn-77.5)
        if: always() && runner.os != 'Windows'
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/pick_python_test.sh"
        # POSIX/mac-linux unit layer for the interpreter probe: a fake 9009
        # `python3` stub first on PATH must be rejected by the shared resolver +
        # the bash launcher, PYTHON_BIN override is itself probed, py -3 preferred,
        # python3 still first on mac/linux (R8). The real windows-latest end-to-end
        # of flowctl.cmd + the bash launcher lives in the windows-python3-stub job.

      - name: ci_test.sh (flowctl integration, 58 cases)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/ci_test.sh"

      - name: alias_smoke.sh (deprecation alias paths + fn-77 9009-stub bypass, ~5s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/alias_smoke.sh"

      - name: migration_smoke.sh (migrate-rename + rollback + banner, 41 cases, ~30s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/migration_smoke.sh"

      - name: resolve-pr_smoke_test.sh (58 cases, ~1s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/resolve-pr_smoke_test.sh"

      - name: strategy_smoke_test.sh (62 cases, ~5s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/strategy_smoke_test.sh"

      - name: audit_smoke_test.sh (41 cases, ~6s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/audit_smoke_test.sh"

      - name: glossary_smoke_test.sh (80 cases, ~7s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/glossary_smoke_test.sh"

      - name: prospect_smoke_test.sh (94 cases, ~60s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/prospect_smoke_test.sh"

      - name: make-pr_smoke_test.sh (67 cases, ~7s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/make-pr_smoke_test.sh"

      - name: map_smoke_test.sh (75 cases, fn-50.1 + fn-50.6 directory-level ignore + config-state --json guards)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/map_smoke_test.sh"

      - name: impl-review_smoke_test.sh (74 cases, ~70s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/impl-review_smoke_test.sh"

      - name: smoke_test.sh (130 cases, ~100s)
        if: always()
        run: |
          cd "$RUNNER_TEMP"
          bash "$GITHUB_WORKSPACE/plugins/flow-next/scripts/smoke_test.sh"

      # Smokes intentionally skipped (require external CLIs not on GitHub runners):
      #   - ralph_smoke_test.sh / ralph_smoke_rp.sh — need claude / codex / rp-cli
      #   - plan_review_prompt_smoke.sh — needs rp-cli

  # ─────────────────────────────────────────────────────────────────────────────
  # fn-77.5 (R10): real windows-latest end-to-end. A DETERMINISTIC fake `python3`
  # stub (exit 9009 — the Microsoft Store App Execution Alias failure mode) is
  # forced FIRST on PATH for BOTH a Git Bash step AND a PowerShell/cmd step (NOT
  # reliant on the runner's own Store alias, which may be absent). A real
  # python.org Python (+ the py launcher, already on the hosted image) is present
  # via setup-python; then the bash `flowctl` launcher and the `flowctl.cmd` batch
  # shim must each probe past the stub, resolve a working interpreter, and run
  # `flowctl init` — proving the fix works in the exact shells where Claude
  # Desktop / native Codex / Cursor invoke flowctl on Windows.
  # ─────────────────────────────────────────────────────────────────────────────
  windows-python3-stub:
    runs-on: windows-latest
    steps:
      - name: Disable git autocrlf so the LF-pinned bash launcher stays LF
        shell: bash
        run: git config --global core.autocrlf false
        # The bash `flowctl` launcher is pinned eol=lf (.gitattributes); CRLF would
        # break `bash` parsing. Default Windows-runner autocrlf would rewrite it.

      - uses: actions/checkout@v4

      - name: Setup Python (real python.org interpreter + py launcher)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git identity (flowctl init touches git)
        shell: bash
        run: |
          git config --global user.email "ci@flow-next.test"
          git config --global user.name "flow-next CI"
          git config --global init.defaultBranch main

      - name: Build a deterministic 9009 python3 stub for both shells
        shell: bash
        run: |
          set -euo pipefail
          STUB="$RUNNER_TEMP/pystub"
          mkdir -p "$STUB"
          # Extensionless stub for Git Bash: MSYS resolves bare `python3` to this
          # shebang script (it does not append .cmd), so `python3` runs the stub.
          {
            printf '#!/bin/bash\n'
            printf 'echo "Python was not found; run without arguments to install from the Microsoft Store, or disable this shortcut from Settings > Apps > Advanced app settings > App execution aliases." >&2\n'
            printf 'exit 9009\n'
          } > "$STUB/python3"
          chmod +x "$STUB/python3"
          # .cmd stub for cmd.exe / PowerShell: PATHEXT resolves `python3` here.
          {
            printf '@ECHO OFF\n'
            printf 'ECHO Python was not found; disable the Microsoft Store App execution alias. 1>&2\n'
            printf 'EXIT /b 9009\n'
          } > "$STUB/python3.cmd"
          # Prove the stub really is non-functional before wiring it onto PATH.
          if "$STUB/python3" -c "import sys" >/dev/null 2>&1; then
            echo "FAIL: stub python3 should exit non-zero" >&2; exit 1
          fi
          printf 'PYSTUB_DIR=%s\n' "$STUB" >> "$GITHUB_ENV"

      - name: Git Bash — bash `flowctl` bypasses the 9009 stub
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$PYSTUB_DIR:$PATH"
          echo "python3 resolves to: $(command -v python3)"
          # The stub is genuinely first on PATH and non-functional.
          if python3 -c "import sys" >/dev/null 2>&1; then
            echo "FAIL: python3 stub should exit non-zero under Git Bash" >&2; exit 1
          fi
          FLOWCTL="$GITHUB_WORKSPACE/plugins/flow-next/scripts/flowctl"
          REPO="$RUNNER_TEMP/bash-stub-repo"; mkdir -p "$REPO"; cd "$REPO"; git init -q
          OUT="$("$FLOWCTL" init --json 2>&1)" || { echo "FAIL: launcher exited non-zero"; echo "$OUT"; exit 1; }
          echo "$OUT"
          echo "$OUT" | grep -q '"success": true' || { echo "FAIL: flowctl init did not succeed" >&2; exit 1; }
          if echo "$OUT" | grep -q "Python was not found"; then
            echo "FAIL: stub message leaked — launcher did not bypass the stub" >&2; exit 1
          fi
          echo "PASS: bash flowctl bypassed the 9009 python3 stub"

      - name: PowerShell — `flowctl.cmd` bypasses the 9009 stub
        shell: pwsh
        run: |
          # GitHub pwsh sets $ErrorActionPreference='Stop'; with the 7.3+ default
          # $PSNativeCommandUseErrorActionPreference=$true a non-zero native exit
          # THROWS. We invoke a stub that is MEANT to fail, so drive control flow
          # off $LASTEXITCODE explicitly instead.
          $PSNativeCommandUseErrorActionPreference = $false
          $env:PATH = "$env:PYSTUB_DIR;$env:PATH"
          Write-Host "python3 resolves to: $((Get-Command python3 -ErrorAction SilentlyContinue).Source)"
          # The stub is genuinely first on PATH and non-functional (native 9009).
          & python3 -c "import sys" 2>$null
          if ($LASTEXITCODE -eq 0) { Write-Error "python3 stub should exit non-zero in pwsh"; exit 1 }
          $flowctl = Join-Path $env:GITHUB_WORKSPACE "plugins/flow-next/scripts/flowctl.cmd"
          $repo = Join-Path $env:RUNNER_TEMP "cmd-stub-repo"
          New-Item -ItemType Directory -Force -Path $repo | Out-Null
          Set-Location $repo
          git init -q
          $out = & $flowctl init --json 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0) { Write-Error "flowctl.cmd exited $LASTEXITCODE"; exit 1 }
          if ($out -notmatch '"success": true') { Write-Error "flowctl.cmd init did not succeed"; exit 1 }
